name: Rust

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
          components: clippy, rustfmt
    - run: cargo build
    - run: cargo test
    - run: cargo fmt --all -- --check
    - run: cargo check
    - run: cargo clippy --all --all-features

    - name: Build release (Ubuntu musl)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update && sudo apt-get install -y musl-tools musl-dev
        rustup target add x86_64-unknown-linux-musl
        cargo build --target x86_64-unknown-linux-musl --release --package server
        cargo build --target x86_64-unknown-linux-musl --release --package simulation

    - name: Smoke test server (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -euo pipefail

        # minimal image directory with two dummy PNGs
        IMG_DIR=$(mktemp -d)
        echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > "$IMG_DIR/1.png"
        echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > "$IMG_DIR/2.png"

        PORT=9877
        DB=$(mktemp)
        SERVER=target/x86_64-unknown-linux-musl/release/server

        "$SERVER" --port "$PORT" --image-dir "$IMG_DIR" --output "sqlite://$DB" &
        SERVER_PID=$!

        # wait for server to bind
        for i in $(seq 1 30); do
          if curl -sfo /dev/null "http://[::1]:$PORT/" 2>/dev/null; then
            echo "Server ready after ${i}s"
            break
          fi
          sleep 1
        done

        # smoke test endpoints
        echo "=== GET / ==="
        curl -sSf "http://[::1]:$PORT/" > /dev/null
        echo "OK"

        # cleanup
        kill "$SERVER_PID" 2>/dev/null || true
        wait "$SERVER_PID" 2>/dev/null || true
        rm -f "$DB"
        rm -rf "$IMG_DIR"

    - name: Upload artifacts (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: linux-musl
        path: |
          target/x86_64-unknown-linux-musl/release/server
          target/x86_64-unknown-linux-musl/release/simulation

    - name: Build release (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cargo build --release --package server
        cargo build --release --package simulation
    - name: Upload artifacts (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: |
          target/release/server.exe
          target/release/simulation.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-musl
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/**
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
